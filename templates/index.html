<style>
    body {
        margin: 0;
        padding: 0;
        background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1920');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        height: 100vh;
        color: white; 
        font-family: 'Segoe UI', Tahoma, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgba(0, 0, 0, 0.4);
        background-blend-mode: darken;
    }

    /* Стеклянная карточка-контейнер */
    .content {
        background: rgba(255, 255, 255, 0.1); 
        padding: 60px 40px;
        border-radius: 30px;
        text-align: center;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        max-width: 650px;
        width: 90%;
    }

    /* Стили заглавия */
    .quiz-title {
        margin-bottom: 40px;
    }

    .quiz-title h1 {
        font-size: 3.5rem;
        font-weight: 800;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 4px;
        background: linear-gradient(to bottom, #ffffff, #d1d1d1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
    }

    .quiz-title p {
        font-size: 1.2rem;
        color: rgba(255, 255, 255, 0.8);
        margin-top: 10px;
        letter-spacing: 1px;
    }

    .button-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
    }

    .btn {
        width: 100%;
        max-width: 350px;
        padding: 18px 25px;
        border-radius: 15px;
        font-size: 1.1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.3);
        text-decoration: none;
        color: white;
        display: block;
        box-sizing: border-box;
    }

    .btn-start {
        background: rgba(40, 167, 69, 0.25);
    }

    .btn-start:hover {
        background: rgba(40, 167, 69, 0.45);
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(40, 167, 69, 0.4);
        border-color: rgba(255, 255, 255, 0.6);
    }

    .btn-author {
        background: rgba(0, 123, 255, 0.2);
    }

    .btn-author:hover {
        background: rgba(0, 123, 255, 0.4);
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 123, 255, 0.3);
        border-color: rgba(255, 255, 255, 0.6);
    }
</style>

<div class="content">
    <div class="quiz-title">
        <h1>QUIZ MASTER</h1>
        <p>Проверь свои знания по предметам!</p>
    </div>

    <div class="button-container">
        <a href="{% url 'quiz' %}" class="btn btn-start">Начать викторину</a>
        <a href="{% url 'about' %}" class="btn btn-author">О коде (всё равно не поймёте!)</a>
    </div>
</div>
